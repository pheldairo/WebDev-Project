<div class="auth-layout">
  <div class="auth-top-nav">
    <a routerLink="/" class="back-link">← Back to Home</a>
    <button class="theme-toggle-mini" (click)="toggleTheme()">
      {{ themeService.isDark() ? '☀️' : '🌙' }}
    </button>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome Back</h1>
      <p>Log in to access your schedules and rooms</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="form">
      <div class="form-group">
        <label>Username</label>
        <input
          formControlName="username"
          class="input"
          [class.invalid]="f['username'].invalid && f['username'].touched"
          type="text"
          placeholder="Enter your username"
        />
        <div *ngIf="f['username'].invalid && f['username'].touched" class="field-error">
          <small *ngIf="f['username'].errors?.['required']">Username is required.</small>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          formControlName="password"
          class="input"
          [class.invalid]="f['password'].invalid && f['password'].touched"
          type="password"
          placeholder="••••••••"
        />
        <div *ngIf="f['password'].invalid && f['password'].touched" class="field-error">
          <small *ngIf="f['password'].errors?.['required']">Password is required.</small>
        </div>
      </div>

      <div *ngIf="error" class="form-error mt-2">
        {{ error }}
      </div>

      <button type="submit" class="btn-primary w-full block mt-3" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="switch-auth">
      Don't have an account? <a routerLink="/register">Sign up for free</a>
    </div>
  </div>
</div>
