<div class="auth-layout">
  <div class="auth-top-nav">
    <a routerLink="/" class="back-link">← Back to Home</a>
    <button class="theme-toggle-mini" (click)="toggleTheme()">
      {{ themeService.isDark() ? '☀️' : '🌙' }}
    </button>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <h1>Create an Account</h1>
      <p>Set up your profile to start scheduling</p>
    </div>

    <form (ngSubmit)="register()" class="form">
      <div class="form-group">
        <label>Username</label>
        <input [(ngModel)]="username" name="username" class="input" type="text" placeholder="Your username" required />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input [(ngModel)]="email" name="email" class="input" type="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input [(ngModel)]="password" name="password" class="input" type="password" placeholder="••••••••" required />
      </div>

      <div *ngIf="error" class="form-error">
        {{ error }}
      </div>

      <button type="submit" class="btn-primary w-full block mt-2" [disabled]="loading || !username || !password || !email">
        {{ loading ? 'Creating Account...' : 'Sign Up' }}
      </button>
    </form>

    <div class="switch-auth">
      Already have an account? <a routerLink="/login">Sign In</a>
    </div>
  </div>
</div>
