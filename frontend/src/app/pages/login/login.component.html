<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">📅 UniSchedule</div>
    <h2>Вход</h2>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input [(ngModel)]="username" type="text" placeholder="username" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <button class="btn-primary" (click)="login()" [disabled]="loading">
      {{ loading ? 'Входим...' : 'Войти' }}
    </button>

    <p class="switch-link">
      Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a>
    </p>
  </div>
</div>
