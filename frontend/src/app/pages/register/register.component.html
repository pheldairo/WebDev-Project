<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">📅 UniSchedule</div>
    <h2>Регистрация</h2>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input [(ngModel)]="username" type="text" placeholder="username" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="email@example.com" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <button class="btn-primary" (click)="register()" [disabled]="loading">
      {{ loading ? 'Создаём...' : 'Создать аккаунт' }}
    </button>

    <p class="switch-link">
      Уже есть аккаунт? <a routerLink="/login">Войти</a>
    </p>
  </div>
</div>
