<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-left">
    <button class="btn-back" (click)="goToRooms()">← Комнаты</button>
    <div class="nav-logo">📅 UniSchedule</div>
  </div>
  <div class="nav-right">
    <button class="btn-outline" (click)="logout()">Выйти</button>
  </div>
</nav>

<div class="page">
  <!-- AVATAR SECTION -->
  <div class="profile-header">
    <div class="avatar" [style.background]="getAvatarColor()">
      {{ getInitials() }}
    </div>
    <div class="profile-info">
      <h1>{{ user?.username }}</h1>
      <p class="join-date">📅 Зарегистрирован: {{ getJoinDate() }}</p>
    </div>
  </div>

  <!-- MESSAGES -->
  @if (error) {
    <div class="msg error">❌ {{ error }}</div>
  }
  @if (success) {
    <div class="msg success">✅ {{ success }}</div>
  }

  <!-- EDIT FORM -->
  <div class="card">
    <h2>Редактировать профиль</h2>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input [(ngModel)]="username" type="text" placeholder="username" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" placeholder="email@example.com" />
    </div>

    <button class="btn-primary" (click)="save()">Сохранить</button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon">🏠</div>
      <div class="stat-label">Комнаты</div>
      <div class="stat-value">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📋</div>
      <div class="stat-label">Занятий добавлено</div>
      <div class="stat-value">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🎙️</div>
      <div class="stat-label">Голосовой чат</div>
      <div class="stat-value coming">Скоро</div>
    </div>
  </div>
</div>
